<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jesmoniteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b4b2a9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9c9a92;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#73726c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#f9f7f2" opacity="0.5"/>

  <!-- Vessel 1 (Left, rounded bowl) -->
  <g filter="url(#shadow)">
    <path d="M 35 120 Q 35 100, 40 85 Q 45 70, 55 65 Q 70 60, 75 65 Q 80 70, 80 85 Q 80 100, 75 120 Z" 
          fill="url(#jesmoniteGrad)" stroke="#5f5e5a" stroke-width="0.5"/>
    <ellipse cx="57.5" cy="65" rx="20" ry="8" fill="#c2c0b6" opacity="0.4"/>
  </g>

  <!-- Vessel 2 (Center, tall geometric) -->
  <g filter="url(#shadow)">
    <path d="M 95 140 L 100 50 L 105 140 Q 105 150, 100 155 Q 95 150, 95 140 Z" 
          fill="url(#jesmoniteGrad)" stroke="#5f5e5a" stroke-width="0.5"/>
    <!-- Geometric texture lines -->
    <line x1="98" y1="70" x2="102" y2="70" stroke="#5f5e5a" stroke-width="0.5" opacity="0.3"/>
    <line x1="97" y1="90" x2="103" y2="90" stroke="#5f5e5a" stroke-width="0.5" opacity="0.3"/>
    <line x1="96" y1="110" x2="104" y2="110" stroke="#5f5e5a" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Vessel 3 (Right, cubic form) -->
  <g filter="url(#shadow)">
    <path d="M 125 75 L 145 75 L 148 130 Q 145 145, 135 145 Q 125 145, 122 130 Z" 
          fill="url(#jesmoniteGrad)" stroke="#5f5e5a" stroke-width="0.5"/>
    <!-- Highlight edge -->
    <line x1="126" y1="80" x2="144" y2="80" stroke="#c2c0b6" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Decorative base shadow -->
  <ellipse cx="100" cy="175" rx="65" ry="10" fill="#5f5e5a" opacity="0.1"/>

  <!-- Minimal decorative line -->
  <line x1="30" y1="160" x2="170" y2="160" stroke="#d3d1c7" stroke-width="0.5" opacity="0.3"/>
</svg>
