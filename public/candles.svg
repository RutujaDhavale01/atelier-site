<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="candleWax" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0997b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d85a30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flame1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f2a623;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcde5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce5c1;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#f9f7f2" opacity="0.5"/>

  <!-- Candle 1 (Left) -->
  <g>
    <!-- Wax body -->
    <rect x="30" y="80" width="40" height="80" rx="8" fill="url(#candleWax)"/>
    <!-- Wick -->
    <rect x="46" y="70" width="2" height="15" fill="#5f5e5a"/>
    <!-- Flame -->
    <path d="M 47 60 Q 44 50, 47 40 Q 50 50, 47 60 Z" fill="url(#flame1)"/>
    <path d="M 47 58 Q 45 52, 47 46 Q 49 52, 47 58 Z" fill="#fcde5a" opacity="0.6"/>
  </g>

  <!-- Candle 2 (Center, taller) -->
  <g>
    <!-- Wax body -->
    <rect x="80" y="60" width="40" height="100" rx="8" fill="url(#candleWax)" opacity="0.9"/>
    <!-- Wick -->
    <rect x="96" y="50" width="2" height="15" fill="#5f5e5a"/>
    <!-- Flame -->
    <path d="M 97 40 Q 94 25, 97 15 Q 100 25, 97 40 Z" fill="url(#flame1)"/>
    <path d="M 97 38 Q 95 30, 97 22 Q 99 30, 97 38 Z" fill="#fcde5a" opacity="0.6"/>
  </g>

  <!-- Candle 3 (Right) -->
  <g>
    <!-- Wax body -->
    <rect x="130" y="85" width="40" height="75" rx="8" fill="url(#candleWax)" opacity="0.85"/>
    <!-- Wick -->
    <rect x="146" y="75" width="2" height="15" fill="#5f5e5a"/>
    <!-- Flame -->
    <path d="M 147 65 Q 144 55, 147 45 Q 150 55, 147 65 Z" fill="url(#flame1)"/>
    <path d="M 147 63 Q 145 57, 147 51 Q 149 57, 147 63 Z" fill="#fcde5a" opacity="0.6"/>
  </g>

  <!-- Decorative glow -->
  <ellipse cx="100" cy="180" rx="70" ry="12" fill="#f2a623" opacity="0.15"/>
</svg>
